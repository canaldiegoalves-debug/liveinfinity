<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <base href="./">
  <title>Live Infinity Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section id="admin-login" class="admin-login">
    <div class="login-card">
      <img src="live-infinity-icon.png" alt="Live Infinity" class="login-logo">
      <h1><span>LIVE</span> INFINITY</h1>
      <p>Automação infinita. Lucro sem limites.</p>

      <label>Usuário administrativo</label>
      <input id="admin-user" value="admin">

      <label>Senha</label>
      <input id="admin-password" type="password" placeholder="Senha administrativa">

      <button id="admin-enter" class="primary">Entrar no painel</button>
      <div id="admin-login-message" class="message"></div>
    </div>
  </section>

  <div id="admin-app" class="admin-shell hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="live-infinity-icon.png" alt="">
        <div>
          <strong><span>LIVE</span> INFINITY</strong>
          <small>ADMIN CONTROL</small>
        </div>
      </div>

      <nav id="admin-nav">
        <button data-page="dashboard" class="active">⌂ Dashboard</button>
        <button data-page="licenses">🔑 Licenças</button>
        <button data-page="users">👥 Clientes</button>
        <button data-page="finance">💰 Faturamento</button>
        <button data-page="reports">📊 Relatórios</button>
        <button data-page="support">🎫 Suporte</button>
        <button data-page="cakto">🛒 Cakto</button>
        <button data-page="updates">⬆️ Atualizações</button>
      </nav>

      <div class="sidebar-bottom">
        <div class="server-dot"><i></i> Servidor conectado</div>
        <small id="server-version">Versão...</small>
        <button id="admin-logout">Sair</button>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <small id="page-kicker">VISÃO GERAL</small>
          <h1 id="page-title">Dashboard</h1>
        </div>
        <div class="top-actions">
          <span id="last-update">Atualizando...</span>
          <button id="refresh">↻ Atualizar</button>
        </div>
      </header>

      <main id="page-content"></main>
    </section>
  </div>

  <template id="license-card-template">
    <article class="license-card">
      <div class="license-head">
        <div>
          <span class="license-plan"></span>
          <h3 class="license-email"></h3>
          <code class="license-key"></code>
        </div>
        <span class="license-status"></span>
      </div>

      <div class="license-grid">
        <div><span>Duração</span><strong class="license-duration"></strong></div>
        <div><span>Restantes</span><strong class="license-remaining"></strong></div>
        <div><span>Ativação</span><strong class="license-activated"></strong></div>
        <div><span>Vencimento</span><strong class="license-expires"></strong></div>
      </div>

      <p class="license-note"></p>

      <div class="license-actions">
        <button data-action="copy">Copiar chave</button>
        <button data-action="edit">Editar</button>
        <button data-action="renew">Adicionar dias</button>
        <button data-action="device">Liberar dispositivo</button>
        <button data-action="toggle"></button>
        <button data-action="delete" class="danger">Excluir</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
